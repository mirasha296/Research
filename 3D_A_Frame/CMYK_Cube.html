<!DOCTYPE html>
<html>
<head>
    <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
    <!-- <script src="CMYK_Cube.js"></script> -->
     <script src="js/aframe-environment-component.min.js"></script>
    <script src="aframe-extras.js"></script>
    <script src="https://unpkg.com/aframe-environment-component/dist/aframe-environment-component.min.js"></script>
    <script src="https://unpkg.com/aframe-physics-extras@0.1.2/dist/aframe-physics-extras.min.js"></script> <!-- physics extra -->
    

</head>
<body>
    <a-scene physics="0" renderer="sortTransparentObjects: true">
        <!-- oculus hand controls -->
        <!-- <a-entity id="leftHand" hand-controls="hand: left; handModelStyle: lowPoly; color: #ffcccc"></a-entity>
        <a-entity id="rightHand" hand-controls="hand: right; handModelStyle: lowPoly; color: #ffcccc"></a-entity> -->

        <!-- background & foreground -->
        <!-- <a-sky color="#142240"></a-sky>
        <a-box color="white" 
                position=" 0 0 0" 
                rotation="0 0 0" 
                width="100"
                depth="100" 
                height="0.1">
        </a-box> -->
        
        <a-entity id="entity" movement-controls="controls: gamepad, trackpad, keyboard; speed: 0.03;" position="0 0 0">
        <a-camera></a-camera>
        <a-entity id="leftHand" hand-controls="hand: left; handModelStyle: highPoly; color: #ffcccc" test-controls></a-entity>
        <a-entity id="rightHand" hand-controls="hand: right; handModelStyle: highPoly; color: #ffcccc" test-controls></a-entity>
        </a-entity>

        <!-- <a-box
            position="0 0 -2"
            color="#aa0000"
            height="4"
            material="opacity: 0.5"
        ></a-box>
    
        <a-box
            position="-1 0 -7"
            color="#00AA00"
            height="4"
            material="opacity: 0.5"
        ></a-box> -->


        <!-- CMYK Cube entity of planes -->

        <a-entity environment="preset: contact" preset-switcher id="environment"></a-entity>
        <a-entity physics="0" id="cube" position="0 2 -2" rotation="0 0 0" scale="0.3 0.3 0.3"> 
        
        <!-- magenta plane 2-sides -->
            <a-plane
                color="magenta"
                position="0 0 0.5"
                material="side: double; opacity: 0.5"
            ></a-plane>

            <a-plane
                color="transparent"
                position="0 0 -0.5"
                material="side: double; opacity: 0.5"
            ></a-plane>

            <!-- cyan plane 2 sides -->
            <a-plane
                color="cyan"
                position="0.5 0 0"
                rotation="0 90 0"
                material="side: double; opacity: 0.5"
            ></a-plane>

            <a-plane
                color="transparent"
                position="-0.5 0 0"
                rotation="0 90 0"
                material="side: double; opacity: 0.5"
            ></a-plane>

            <!-- yellow plane 2 sides -->
            <a-plane
                color="yellow"
                position="0 0.5 0"
                rotation="90 0 0"
                material="side: double; opacity: 0.5"
            ></a-plane>

            <a-plane
                color="transparent"
                position="0 -0.5 0"
                rotation="90 0 0"
                material="side: double; opacity: 0.5"
            ></a-plane>
        </a-entity>

        <!-- <a-torus-knot
            position="1.5 2 -4"
            color="red"
        ></a-torus-knot> -->

        <a-cylinder
            position="0 0 -2"
            color="#00E5FF"
            height="2.5"
            radius="0.5"
        ></a-cylinder>
    </a-scene>

    <script>

    // // move cube onto right hand
    // let cube = document.getElementById("cube");
    // let rightHand = document.getElementById("rightHand");

    // rightHand.appendChild(cube);




    //GUI does not show in the browser during live server or preview
    let gui = new lil.GUI({ title: 'Controls' })
    // variables to change using the gui
    let values = { 
        cubeRotationAngle: 0,

    }
    console.log("This is working");
    function rotateCube(angle)
    {
        document.getElementById("cube").setAttribute("rotation", `0 ${angle} 0`)
    }
    gui.add(values, "cubeRotationAngle", 0, 360, 1).onChange(rotateCube) 

    </script>


</body>
</html>
