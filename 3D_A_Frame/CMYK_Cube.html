   let cubeGrabbed = false;

    AFRAME.registerComponent('test-grab',

        {

AFRAME.registerComponent('face-forward', {

    AFRAME.registerComponent('test-distance',  
    {
        init: function()
        {
            

            cubeGrabbed = false;
            this.text = document.getElementById("text"); 
            this.rightHand = document.getElementById("rightHand");
            this.cube = document.getElementById("cube");
            this.el.addEventListener('gripdown',  this.grab.bind(this));
            this.el.addEventListener('gripup',  this.ungrab.bind(this));
            this.el.addEventListener('axismove', this.rotate.bind(this));
            

        },



        grab: function() 
        {
                // this.text.setAttribute("value", "grab function started");
                // let text = document.getElementById("text"); 
                // text.setAttribute("value", "grab was called");

                let rightHand = document.getElementById("rightHand");
                let cube = document.getElementById("cube");

                // measure the distance from cube to hand (is it small?)
                let positionCube = cube.getAttribute("position");

                // extra code to access the Javascript layer
                //   and functions to get the absolute position
                let absoluteHandPosition = new THREE.Vector3();
                // text.setAttribute("value", "vector was created");
                rightHand.object3D.getWorldPosition(absoluteHandPosition);
                // text.setAttribute("value", "world position set");

                // this code only gets the local/relative position
                // this.positionHand = rightHand.getAttribute("position"); 
                
                //multidimensional pythagorean theorem
                let a = positionCube.x - absoluteHandPosition.x;
                let b = positionCube.y - absoluteHandPosition.y;
                let c = positionCube.z - absoluteHandPosition.z;

                let distance = Math.sqrt( a*a + b*b + c*c);

                // text.setAttribute("value", distance );

                if (distance < 0.29 && cubeGrabbed == false)
                {
                    cubeGrabbed = true;

                    this.startCubePosition = { x:0, y:0, z:0 };
                    let tempCubePosition = cube.getAttribute("position");    
                    this.startCubePosition.x = tempCubePosition.x;
                    this.startCubePosition.y = tempCubePosition.y;
                    this.startCubePosition.z = tempCubePosition.z;                    
                    
                    this.startHandPosition = { x:0, y:0, z:0 };
                    let tempHandPosition = new THREE.Vector3();
                    rightHand.object3D.getWorldPosition(tempHandPosition);
                    this.startHandPosition.x = tempHandPosition.x;
                    this.startHandPosition.y = tempHandPosition.y;
                    this.startHandPosition.z = tempHandPosition.z;                    
                    
                    // this.text.setAttribute("value", "grab conditions satisfied");


                }

        },

        ungrab: function()
        {
            cubeGrabbed = false;
        },

        rotate: function(event)
        {
            let leftControllerXAxis  = event.detail.axis[0];
            let leftControllerYAxis  = event.detail.axis[1];
            let rightControllerXAxis = event.detail.axis[2];
            let rightControllerYAxis = event.detail.axis[3]; 

            let cube = document.getElementById("cube");

            // this.text.setAttribute("value", rightControllerXAxis);

            if (rightControllerXAxis < -0.1 && cubeGrabbed == true)
            {
                // this.text.setAttribute("value", "rotating left y-bound \n" + rightControllerXAxis);
                // cube.object3D.rotation.y -= 0.1 * Math.abs(rightControllerXAxis);
                cube.object3D.rotateOnWorldAxis(new THREE.Vector3(0,1,0), -0.1 * Math.abs(rightControllerXAxis));
                // this.text.setAttribute("value", "cube y rotation \n" + cube.el.object3D.rotation.y);
                
            }
            if (rightControllerXAxis > 0.1 && cubeGrabbed == true)
            {
                // this.text.setAttribute("value", "rotating right y-bound \n" + rightControllerXAxis);
                // cube.object3D.rotation.y += 0.1 * Math.abs(rightControllerXAxis);
                cube.object3D.rotateOnWorldAxis(new THREE.Vector3(0,1,0), 0.1 * Math.abs(rightControllerXAxis));
                // this.text.setAttribute("value", "cube y rotation \n" + cube.el.object3D.rotation.y);
            }
            if (rightControllerYAxis < -0.1 && cubeGrabbed == true)
            {
                // this.text.setAttribute("value", "rotating up x-bound \n" + rightControllerYAxis);
                // cube.object3D.rotation.x += 0.1 * Math.abs(rightControllerYAxis);
                cube.object3D.rotateOnWorldAxis(new THREE.Vector3(1,0,0), -0.1 * Math.abs(rightControllerYAxis));
            }
            if (rightControllerYAxis > 0.1 && cubeGrabbed == true)
            {
                // this.text.setAttribute("value", "rotating down x-bound \n" + rightControllerYAxis);
                // cube.object3D.rotation.x -= 0.1 * Math.abs(rightControllerYAxis);
                cube.object3D.rotateOnWorldAxis(new THREE.Vector3(1,0,0), 0.1 * Math.abs(rightControllerYAxis));
            }

            //leftcontroller does not show for some reason, but the code is here for when it does work
            // if (leftControllerXAxis < -0.1 && cubeGrabbed == true)
            // {
            //     this.text.setAttribute("value", "rotating left y-bound \n" + leftControllerXAxis);
            // }
            // if (leftControllerXAxis > 0.1 && cubeGrabbed == true)
            // {
            //     this.text.setAttribute("value", "rotating right y-bound \n" + leftControllerXAxis);
            // }
            
        },

        // tick is an AFRAME component function that constantly runs
        tick: function () 
        {
            
            if (cubeGrabbed)
            {
                // this.text.setAttribute("value", "grab tick function started");

                let rightHand = document.getElementById("rightHand");

                let currentHandPosition = new THREE.Vector3();
                rightHand.object3D.getWorldPosition(currentHandPosition);  
                let directionHandMoved = { x:0, y:0, z:0 };
                directionHandMoved.x = currentHandPosition.x - this.startHandPosition.x;
                directionHandMoved.y = currentHandPosition.y - this.startHandPosition.y;
                directionHandMoved.z = currentHandPosition.z - this.startHandPosition.z;

                // directionHandMoved = currentHandPosition - startHandPosition
                // similarly...
                // directionCubeMoved = currentCubePosition - startCubePosition
                // rearrange the previous equation...
                // currentCubePosition = startCubePosition + directionCubeMoved
                // since the cube and hand move in the same way...
                // directionCubeMoved = directionHandMoved
                // by substitution...
                // currentCubePosition = startCubePosition + directionHandMoved

                let currentCubePosition = { x:0, y:0, z:0 };
                currentCubePosition.x = this.startCubePosition.x + directionHandMoved.x;
                currentCubePosition.y = this.startCubePosition.y + directionHandMoved.y;
                currentCubePosition.z = this.startCubePosition.z + directionHandMoved.z;

                let check = " " + directionHandMoved.x + " " + directionHandMoved.y + " " + directionHandMoved.z + " " + currentCubePosition.x + " " + currentCubePosition.y + " " + currentCubePosition.z

                this.cube.setAttribute("position", currentCubePosition);
                // this.text.setAttribute("value", "cube grabbed");
                // this.text.setAttribute("value", check);
            }


        }
    });
//-------------------------------------------------------------------------------------------------------------------
    </script>
