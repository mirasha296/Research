<!DOCTYPE html>
<html>
<head>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="js/aframe-environment-component.min.js"></script>
    <script src="aframe-extras.js"></script>
    <script src="https://unpkg.com/aframe-environment-component/dist/aframe-environment-component.min.js"></script>
    <!-- <script src="https://unpkg.com/aframe-physics-extras@0.1.2/dist/aframe-physics-extras.min.js"></script> physics extra -->
    <script src="https://cdn.jsdelivr.net/npm/lil-gui@0.19/dist/lil-gui.umd.min.js"></script>

    <script>
    AFRAME.registerComponent('test-grab',  
    {
        init: function () 
        {
            // change color of cylinder 
            function grab(event) {

                let cylinder = document.getElementById("cecilia");
                cylinder.setAttribute("color", "pink");
            }

            function release(event) {

                let cylinder = document.getElementById("cecilia");
                cylinder.setAttribute("color", "green");
            }

            // all listenable events: https://aframe.io/docs/1.7.0/components/meta-touch-controls.html
            this.el.addEventListener('gripdown',  grab );
            this.el.addEventListener('gripup',  release );
        }
    });

    AFRAME.registerComponent('test-distance',  
    {
        init: function()
        {
            this.N = 0;
        },
        // tick is an AFRAME component function that constantly runs
        tick: function () 
        {

            let cylinder = document.getElementById("cecilia");
                
            /*
            step 1: verify that tick works
            N: 0 - 100 -> yellow
            N: 100 - 200 -> blue
            repeat

            step 2: constantly change this to if hand close to cylinder then change
            TBD
            */

            // add 1 to N
            this.N++;

            // change color depending on value
            if (this.N > 0 && this.N < 100)
                cylinder.setAttribute("color", "yellow");

            if (this.N > 100 && this.N < 200)
                cylinder.setAttribute("color", "blue");
            
            // when N gets really big, reset to 0
            if (this.N > 200)
                this.N = 0;

        }
    });

    </script>
</head>
<body>
    <a-scene physics="0" renderer="sortTransparentObjects: true">

        <!-- CMYK Cube entity of planes -->

        <a-entity id="cube" position="0 1.55 -2" rotation="23.825 51.036 -63.28" scale="0.3 0.3 0.3">

            <a-plane

            <a-plane
                color="transparent"
                position="0 0 -0.5"

            ></a-plane>

            <!-- cyan plane 2 sides -->
            <a-plane
                color="cyan"

            <a-plane

                position="-0.5 0 0"

            <!-- yellow plane 2 sides -->
            <a-plane

                position="0 0.5 0"
                rotation="90 0 0"
                material="side: double; opacity: 0.5"
            ></a-plane>

            <a-plane
                color="transparent"
                position="0 -0.5 0"
                rotation="90 0 0"
                material="side: double; opacity: 0.5"
            ></a-plane>
        </a-entity>

        <!-- <a-torus-knot

            id="cecilia"
