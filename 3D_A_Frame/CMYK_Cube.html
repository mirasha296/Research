<!DOCTYPE html>
<html>
<head>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="js/aframe-environment-component.min.js"></script>
    <script src="aframe-extras.js"></script>
    <script src="https://unpkg.com/aframe-environment-component/dist/aframe-environment-component.min.js"></script>
    <!-- <script src="https://unpkg.com/aframe-physics-extras@0.1.2/dist/aframe-physics-extras.min.js"></script> physics extra -->
    <script src="https://cdn.jsdelivr.net/npm/lil-gui@0.19/dist/lil-gui.umd.min.js"></script>

    <script>

//------------March 26th, Select this section from lines 13-129, Uncomment this to continue working------------------------------------------------------------------------------------------
    AFRAME.registerComponent('test-grab',  
    {
        init: function () 
        {
            // change color of cylinder 
            function grab(event) {

                let cylinder = document.getElementById("cecilia");
                cylinder.setAttribute("color", "pink");
            }

            function release(event) {

                let cylinder = document.getElementById("cecilia");
                cylinder.setAttribute("color", "green");
            }

            // all listenable events: https://aframe.io/docs/1.7.0/components/meta-touch-controls.html
            this.el.addEventListener('gripdown',  grab );
            this.el.addEventListener('gripup',  release );
        }
    });

    AFRAME.registerComponent('test-distance',  
    {
        init: function()
        {
            

            this.cubeGrabbed = false;
            this.text = document.getElementById("text"); 
            this.rightHand = document.getElementById("rightHand");
            this.cube = document.getElementById("cube");
            this.el.addEventListener('gripdown',  this.grab.bind(this));
            

        },

        grab: function() 
        {
                this.text.setAttribute("value", "grab function started");
                let text = document.getElementById("text"); 
                text.setAttribute("value", "grab was called");

                let rightHand = document.getElementById("rightHand");
                let cube = document.getElementById("cube");

                // measure the distance from cube to hand (is it small?)
                let positionCube = cube.getAttribute("position");

                // extra code to access the Javascript layer
                //   and functions to get the absolute position
                let absoluteHandPosition = new THREE.Vector3();
                text.setAttribute("value", "vector was created");
                rightHand.object3D.getWorldPosition(absoluteHandPosition);
                text.setAttribute("value", "world position set");

                // this code only gets the local/relative position
                // this.positionHand = rightHand.getAttribute("position"); 
                
                //multidimensional pythagorean theorem
                let a = positionCube.x - absoluteHandPosition.x;
                let b = positionCube.y - absoluteHandPosition.y;
                let c = positionCube.z - absoluteHandPosition.z;

                let distance = Math.sqrt( a*a + b*b + c*c);

                text.setAttribute("value", distance );

                if (distance < 0.29 && this.cubeGrabbed == false)
                {
                    this.cubeGrabbed = true
                    this.startCubePosition = cube.getAttribute("position");    
                    this.startHandPosition = rightHand.getAttribute("position");    
                    this.text.setAttribute("value", "grab conditions satisfied");
                }

        },

        // tick is an AFRAME component function that constantly runs
        tick: function () 
        {
            
            if (this.cubeGrabbed)
            {
                this.text.setAttribute("value", "grab tick function started");
                this.currentCubePosition = this.cube.getAttribute("position"); 
                this.currentHandPosition = this.rightHand.getAttribute("position"); 
                
                let directionHandMoved = { x:0, y:0, z:0 };
                directionHandMoved.x = this.startHandPosition.x - this.currentHandPosition.x;
                directionHandMoved.y = this.startHandPosition.y - this.currentHandPosition.y;
                directionHandMoved.z = this.startHandPosition.z - this.currentHandPosition.z;

                // directionCubeMoved = startCubePosition - currentCubePosition
                // currentCubePosition = startCubePosition - directionCubeMoved
                // directionCubeMoved = directionHandMoved
                // currentCubePosition = startCubePosition - directionHandMoved



                let currentCubePosition = { x:0, y:0, z:0 };
                currentCubePosition.x = this.startCubePosition.x + directionHandMoved.x;
                currentCubePosition.y = this.startCubePosition.y + directionHandMoved.y;
                currentCubePosition.z = this.startCubePosition.z + directionHandMoved.z;

                let check = " " + directionHandMoved.x + " " + directionHandMoved.y + " " + directionHandMoved.z + " " + currentCubePosition.x + " " + currentCubePosition.y + " " + currentCubePosition.z

                this.cube.setAttribute("position", currentCubePosition);
                // this.text.setAttribute("value", "grab tick function finished");
                this.text.setAttribute("value", check);

            }


        }
    });
//-------------------------------------------------------------------------------------------------------------------
    </script>
</head>
<body>
    <a-scene physics="0" renderer="sortTransparentObjects: true">
        <!-- oculus hand controls -->
        <!-- <a-entity id="leftHand" hand-controls="hand: left; handModelStyle: lowPoly; color: #ffcccc"></a-entity>
        <a-entity id="rightHand" hand-controls="hand: right; handModelStyle: lowPoly; color: #ffcccc"></a-entity> -->

        <!-- background & foreground -->
        <!-- <a-sky color="#142240"></a-sky>
        <a-box color="white" 
                position=" 0 0 0" 
                rotation="0 0 0" 
                width="100"
                depth="100" 
                height="0.1">
        </a-box> -->
        
        <a-entity id="entity" movement-controls="controls: gamepad, trackpad, keyboard; speed: 0.03;" position="0 0 0">
            <a-camera></a-camera>
            <a-entity id="leftHand" hand-controls="hand: left; handModelStyle: highPoly; color: #ffcccc"></a-entity>
            <a-entity id="rightHand" hand-controls="hand: right; handModelStyle: highPoly; color: #ffcccc" 
                test-distance></a-entity>
        </a-entity>

        <a-plane width="2" position="0 2 -3" color="white">
            <a-text id="text" value="default" position="0 0 0" align="center" width="4" color="black"></a-text>
        </a-plane>

        <!-- CMYK Cube entity of planes -->

        <a-entity environment="preset: contact" preset-switcher id="environment"></a-entity>
        <a-entity id="cube" position="0 1.55 -2" rotation="23.825 51.036 -63.28" scale="0.3 0.3 0.3"> 
        <!-- magenta plane 2-sides -->
            <a-plane
                color="magenta"
                position="0 0 0.5"
                material="side: double; opacity: 0.5"
            ></a-plane>

            <a-plane
                color="transparent"
                position="0 0 -0.5"
                material="side: double; opacity: 0.5"
            ></a-plane>

            <!-- cyan plane 2 sides -->
            <a-plane
                color="cyan"
                position="0.5 0 0"
                rotation="0 90 0"
                material="side: double; opacity: 0.5"
            ></a-plane>

            <a-plane
                color="transparent"
                position="-0.5 0 0"
                rotation="0 90 0"
                material="side: double; opacity: 0.5"
            ></a-plane>

            <!-- yellow plane 2 sides -->
            <a-plane
                color="yellow"
                position="0 0.5 0"
                rotation="90 0 0"
                material="side: double; opacity: 0.5"
            ></a-plane>

            <a-plane
                color="transparent"
                position="0 -0.5 0"
                rotation="90 0 0"
                material="side: double; opacity: 0.5"
            ></a-plane>
        </a-entity>

        <a-cylinder
            id="cecilia"
            position="0 0 -2"
            color="#00E5FF"
            height="2.25"
            radius="0.5"
        ></a-cylinder>
    </a-scene>

    <script>
    console.log("This is working :)");
    let gui = new lil.GUI({ title: 'Controls' })
    // variables to change using the gui
    let values = { 
        cubeRotationAngle: 0,

    }
    
    function rotateCube(angle)
    {
        document.getElementById("cube").setAttribute("rotation", `0 ${angle} 0`)
    }
    gui.add(values, "cubeRotationAngle", 0, 360, 1).onChange(rotateCube) 
    console.log("This is working :)");
    </script>


</body>
</html>
